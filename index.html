<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫學報告排版助手 2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { @apply px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all shadow-sm text-sm font-medium active:scale-95; }
        .btn-secondary { @apply px-4 py-2 bg-white text-gray-700 rounded-lg hover:bg-gray-100 transition-all shadow-sm text-sm border border-gray-300 active:scale-95; }
        .btn-medical { @apply px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-all shadow-sm text-sm font-medium active:scale-95; }
        .btn-danger { @apply px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-all shadow-sm text-sm border border-red-200 active:scale-95; }
        .btn-orange { @apply px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition-all shadow-sm text-sm font-medium active:scale-95; }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">醫學報告排版助手 <span class="text-blue-600">2.2</span></h1>
                <p class="text-slate-500 text-sm mt-1">專為臨床醫師設計的文字處理工具</p>
            </div>
            <div class="flex gap-2">
                <button id="copyBtn" onclick="copyToClipboard()" class="btn-action flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    複製結果
                </button>
                <button onclick="clearText()" class="btn-danger">清除內容</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 xl:col-span-3 space-y-6">
                
                <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> 臨床整理
                    </h2>
                    <div class="flex flex-col gap-3">
                        <button onclick="Lab()" class="btn-medical w-full">Lab 數據趨勢化</button>
                        <button onclick="removeXray()" class="btn-medical w-full bg-indigo-600 hover:bg-indigo-700">X-Ray 報告去雜訊</button>
                        <button onclick="spaceToArrow()" class="btn-orange w-full">空格轉箭頭 (→)</button>
                        <button onclick="addNumbering()" class="btn-orange w-full bg-orange-600">行首依序加數字</button>
                    </div>
                </section>

                <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 通用排版
                    </h2>
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                            <select id="sel_NewLine" class="flex-1 bg-slate-50 border border-slate-300 text-sm rounded-lg p-2 focus:ring-blue-500">
                                <option value="1">間隔 1 行</option>
                                <option value="2">間隔 2 行</option>
                                <option value="5" selected>間隔 5 行</option>
                                <option value="8">間隔 8 行</option>
                            </select>
                            <button onclick="NewLine()" class="btn-action">批次插入日期</button>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="myFunction()" class="btn-secondary">刪分隔線</button>
                            <button onclick="impactFun()" class="btn-secondary">壓縮空白</button>
                            <button onclick="impactlineFun()" class="btn-secondary">壓縮空行</button>
                            <button onclick="RemoveNewline()" class="btn-secondary">移除換行</button>
                            <button onclick="dotFun()" class="btn-secondary">行首加 .</button>
                            <button onclick="arrFun()" class="btn-secondary">行首加 ></button>
                            <button onclick="FirstCharFun()" class="btn-secondary">刪首字</button>
                            <button onclick="LastCharFun()" class="btn-secondary">刪尾字</button>
                        </div>
                        <button onclick="CapFun()" class="w-full btn-secondary">首字大寫/其餘小寫</button>
                    </div>
                </section>

                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <h3 class="text-xs font-bold text-blue-700 mb-2">快捷鍵提示</h3>
                    <ul class="text-xs text-blue-600 space-y-1">
                        <li>• <b>Alt</b>: 全文右移縮排</li>
                        <li>• <b>Shift + Alt</b>: 全文左移縮排</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-8 xl:col-span-9">
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <div class="bg-slate-800 px-4 py-2 flex justify-between items-center text-slate-400">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-mono text-white/70">EDITOR</span>
                            <button onclick="insertCurrentDate()" class="text-[10px] bg-slate-700 hover:bg-blue-600 text-white px-2 py-0.5 rounded transition-colors border border-slate-600">
                                📅 插入今日日期：<span id="displayDate"></span>
                            </button>
                        </div>
                        <span id="charCount" class="text-xs">0 字元</span>
                    </div>
                    <textarea id="inputtext" 
                        class="w-full p-6 h-[700px] focus:outline-none font-mono text-sm leading-relaxed bg-white"
                        placeholder="在此貼上臨床報告內容..."
                        oninput="updateCharCount()"
                        onkeydown="handleKeyDown(event)"></textarea>
                </div>
            </div>

        </div>
    </div>

    <script>
        const textarea = document.getElementById('inputtext');

        // 更新右上角顯示的日期
        function updateDisplayDate() {
            const d = new Date();
            const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
            document.getElementById('displayDate').innerText = dateStr;
        }
        updateDisplayDate();

        // 在游標處插入日期
        function insertCurrentDate() {
            const d = new Date();
            const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + dateStr + text.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + dateStr.length;
            updateCharCount();
        }

        function updateCharCount() {
            document.getElementById('charCount').innerText = textarea.value.length + " 字元";
        }

        function clearText() {
            if(confirm('確定要清除所有內容嗎？')) {
                textarea.value = '';
                updateCharCount();
            }
        }

        async function copyToClipboard() {
            const content = textarea.value;
            if (!content) return;
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            try {
                await navigator.clipboard.writeText(content);
                btn.innerHTML = '✅ 已複製！';
                btn.classList.add('bg-green-600');
            } catch (err) {
                textarea.select();
                document.execCommand('copy');
                btn.innerHTML = '✅ 已複製！';
            }
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
            }, 2000);
        }

        function spaceToArrow() {
            textarea.value = textarea.value.replace(/ +/g, ' -> ');
            updateCharCount();
        }

        function addNumbering() {
            const lines = textarea.value.split('\n');
            let count = 1;
            textarea.value = lines.map(line => {
                if (line.trim().length > 0) return `${count++}. ${line}`;
                return line;
            }).join('\n');
            updateCharCount();
        }

        function myFunction() {
            textarea.value = textarea.value.split('\n').map(line => line.includes('----------------') ? '' : line).join('\n');
        }

        function impactFun() {
            textarea.value = textarea.value.split('\n').map(line => line.replace(/ +(?= )/g, '')).join('\n');
        }

        function impactlineFun() {
            textarea.value = textarea.value.replace(/\n\s*\n/g, '\n');
        }

        function FirstCharFun() {
            textarea.value = textarea.value.split('\n').map(line => line.length > 0 ? line.slice(1) : line).join('\n');
        }

        function LastCharFun() {
            textarea.value = textarea.value.split('\n').map(line => line.length > 0 ? line.slice(0, -1) : line).join('\n');
        }

        function dotFun() {
            textarea.value = textarea.value.split('\n').map(line => line.trim() ? '.' + line : line).join('\n');
        }

        function arrFun() {
            textarea.value = textarea.value.split('\n').map(line => line.trim() ? '>' + line : line).join('\n');
        }

        function CapFun() {
            const val = textarea.value;
            if (!val) return;
            textarea.value = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
        }

        function RemoveNewline() {
            textarea.value = textarea.value.replace(/\r?\n|\r/g, " ");
        }

        function NewLine() {
            const count = parseInt(document.getElementById('sel_NewLine').value);
            const d = new Date();
            const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
            const lines = textarea.value.split('\n');
            const spacer = '\n'.repeat(count);
            textarea.value = dateStr + '\n' + lines.join(spacer + '\n');
        }

        function removeXray() {
            let str = textarea.value.replace(/\n/g, "@@");
            str = str.replace(/姓名：(.*?)收件時間：/mg, "");
            str = str.replace(/開單科別：(.*?)報告內容＞/mg, "");
            str = str.replace(/＜檢查目的及病程摘要＞(.*?)＜P＞/mg, "");
            str = str.replace(/＜A＞(.*?)＜P＞/mg, "");
            str = str.replace(/@@/g, "\n");
            const filters = ["收件號", "床號：", "放射師："];
            textarea.value = str.split('\n').filter(line => !filters.some(f => line.includes(f))).join('\n');
            impactlineFun();
        }

        function Lab() {
            const labMap = [
                { key: "WBC:1000/uL", nick: "WBC" }, { key: "Hemoglobin:g/dL", nick: "HB" },
                { key: "Platelets:1000/uL", nick: "PLT" }, { key: "BUN (B):mg/dL", nick: "BUN" },
                { key: "Creatinine(B):mg/dL", nick: "Cr" }, { key: "Na:mEq/L", nick: "Na" },
                { key: "K:mEq/L", nick: "K" }, { key: "CRP:mg/L", nick: "CRP" },
                { key: "Troponin-I:ng/mL", nick: "Trp-I" }, { key: "Total Bilirubin:mg/dL", nick: "T-bil" },
                { key: "ALT/GPT:U/L", nick: "ALT" }, { key: "AST/GOT:U/L", nick: "AST" },
                { key: "Hb-A1c:%", nick: "A1c" }, { key: "LDL-C(direct):mg/dL", nick: "LDL" },
                { key: "Triglyceride:mg/dL", nick: "TG" }, { key: "Free-T4:ng/dL", nick: "FT4" },
                { key: "T3:ng/dL", nick: "T3" }, { key: "TSH:uIU/mL", nick: "TSH" },
                { key: "Cortisol:ug/dL", nick: "Cortisol" }, { key: "BNP:pg/mL", nick: "BNP" }
            ];
            let results = {};
            const lines = textarea.value.split('\n');
            lines.forEach(line => {
                labMap.forEach(lab => {
                    if (line.includes(lab.key)) {
                        let values = line.replace(lab.key, '').trim();
                        let formattedVal = values.match(/[-+]?([0-9]*\.[0-9]+|[0-9]+)/g);
                        if (formattedVal) {
                            let valStr = formattedVal.join('->');
                            results[lab.nick] = results[lab.nick] ? results[lab.nick] + '->' + valStr : lab.nick + ':' + valStr;
                        }
                    }
                });
            });
            textarea.value = Object.values(results).join('\n') || "未偵測到符合格式的 Lab 數據";
            updateCharCount();
        }

        function handleKeyDown(e) {
            if (e.altKey) {
                e.preventDefault();
                const lines = textarea.value.split('\n');
                if (e.shiftKey) {
                    textarea.value = lines.map(line => line.startsWith('   ') ? line.substring(3) : line.trimStart()).join('\n');
                } else {
                    textarea.value = lines.map(line => '   ' + line).join('\n');
                }
            }
            updateCharCount();
        }
    </script>
</body>
</html>
